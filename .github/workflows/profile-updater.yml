name: Update Profile README with LinkedIn Feed
on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [linkedin_update]

jobs:
  update-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Inject LinkedIn Post
        run: |
          if [ "${{ github.event.client_payload.post_url }}" != "" ]; then
            POST_TITLE="${{ github.event.client_payload.post_title }}"
            POST_URL="${{ github.event.client_payload.post_url }}"

            sed -i '/<!-- LINKEDIN_POSTS_START -->/,/<!-- LINKEDIN_POSTS_END -->/d' README.md
            sed -i "/## ✍️ Latest Insights & LinkedIn Perspectives/a <!-- LINKEDIN_POSTS_START -->\n\n* 📢 **Latest on LinkedIn:** [$POST_TITLE]($POST_URL)\n\n<!-- LINKEDIN_POSTS_END -->" README.md
          fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff-index --quiet HEAD || git commit -m "chore: sync latest LinkedIn post [skip ci]"
          git push
